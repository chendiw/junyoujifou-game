<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>君疾否 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ff41;
        }

        .login-container {
            background: transparent;
            border: 2px solid #00ff41;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 20px rgba(0, 255, 65, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(5px);
        }

        .title {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            border: 2px solid #00ff41;
            border-radius: 10px;
            background: transparent;
            color: #00ff41;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: rgba(0, 255, 65, 0.7);
        }

        .input-field:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            background: rgba(0, 255, 65, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: 2px solid #00ff41;
            border-radius: 10px;
            background: transparent;
            color: #00ff41;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
            background: rgba(0, 255, 65, 0.1);
            border-color: #00ff88;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            border-color: #00ff88;
            color: #00ff88;
        }

        .btn-secondary:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            background: rgba(0, 255, 136, 0.1);
        }

        .error-message {
            background: rgba(255, 71, 87, 0.9);
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: rgba(0, 184, 148, 0.9);
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .loading {
            display: none;
            margin: 10px 0;
        }

        .spinner {
            border: 3px solid rgba(0, 255, 65, 0.3);
            border-top: 3px solid #00ff41;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mode-switch {
            margin-top: 20px;
            font-size: 14px;
        }

        .mode-switch a {
            color: #00ff88;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-switch a:hover {
            text-decoration: underline;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="title">君疾否</h1>
        <p class="subtitle">欢迎来到《君疾否》小说的世界</p>
        
        <!-- Error/Success Messages -->
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <!-- Create Account Form -->
        <form id="create-account-form">
            <div class="form-group">
                <input type="text" id="create-account-name" class="input-field" 
                       placeholder="请教您尊姓大名？" maxlength="20" required>
            </div>
            <button type="submit" class="btn">创建账户</button>
            <div class="mode-switch">
                已有账户？ <a onclick="switchToLogin()">点击登录</a>
            </div>
        </form>

        <!-- Login Form -->
        <form id="login-form" style="display: none;">
            <div class="form-group">
                <input type="text" id="login-account-name" class="input-field" 
                       placeholder="请输入您的账户名" maxlength="20" required>
            </div>
            <button type="submit" class="btn btn-secondary">登录</button>
            <div class="mode-switch">
                没有账户？ <a onclick="switchToCreate()">创建新账户</a>
            </div>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://junyoujifou-game-functions.azurewebsites.net/api';
        
        // Check if user is already logged in
        window.onload = function() {
            const savedUserId = localStorage.getItem('junyoujifou_userId');
            const savedAccountName = localStorage.getItem('junyoujifou_accountName');
            
            if (savedUserId && savedAccountName) {
                // User is already logged in, redirect to game
                window.location.href = 'survival_game.html';
            }
        };

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('success-message').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function switchToLogin() {
            document.getElementById('create-account-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        function switchToCreate() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('create-account-form').style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        // Create Account Form Handler
        document.getElementById('create-account-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const accountName = document.getElementById('create-account-name').value.trim();
            
            if (!accountName) {
                showError('请输入账户名');
                return;
            }

            if (accountName.length < 2) {
                showError('账户名至少需要2个字符');
                return;
            }

            if (accountName.length > 20) {
                showError('账户名不能超过20个字符');
                return;
            }

            showLoading();
            hideError();

            try {
                const response = await fetch(`${API_BASE_URL}/create-account`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ accountName: accountName })
                });

                const result = await response.json();

                if (response.ok) {
                    // Store user info in localStorage
                    localStorage.setItem('junyoujifou_userId', result.userId);
                    localStorage.setItem('junyoujifou_accountName', result.accountName);
                    
                    showSuccess('账户创建成功！正在进入游戏...');
                    
                    // Redirect to game after a short delay
                    setTimeout(() => {
                        window.location.href = 'survival_game.html';
                    }, 1500);
                } else {
                    showError(result.error || '创建账户失败');
                }
            } catch (error) {
                console.error('Error creating account:', error);
                showError('网络错误，请稍后重试');
            } finally {
                hideLoading();
            }
        });

        // Login Form Handler
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const accountName = document.getElementById('login-account-name').value.trim();
            
            if (!accountName) {
                showError('请输入账户名');
                return;
            }

            showLoading();
            hideError();

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ accountName: accountName })
                });

                const result = await response.json();

                if (response.ok) {
                    // Store user info in localStorage
                    localStorage.setItem('junyoujifou_userId', result.userId);
                    localStorage.setItem('junyoujifou_accountName', result.accountName);
                    
                    showSuccess('登录成功！正在进入游戏...');
                    
                    // Redirect to game after a short delay
                    setTimeout(() => {
                        window.location.href = 'survival_game.html';
                    }, 1500);
                } else {
                    showError(result.error || '登录失败');
                }
            } catch (error) {
                console.error('Error logging in:', error);
                showError('网络错误，请稍后重试');
            } finally {
                hideLoading();
            }
        });

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }
    </script>
</body>
</html>
