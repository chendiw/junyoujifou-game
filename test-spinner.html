<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转盘测试</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Spinner Screen -->
    <div id="spinnerScreen" class="screen active">
        <div class="spinner-container">
            <div class="spinner-wrapper">
                <!-- Outer Ring (Identities) -->
                <div class="spinner-outer" id="spinnerOuter">
                    <div class="spinner-segments" id="outerSegments"></div>
                </div>
                
                <!-- Inner Ring (Locations) -->
                <div class="spinner-inner" id="spinnerInner">
                    <div class="spinner-segments" id="innerSegments"></div>
                </div>
                
                <!-- Center Button -->
                <div class="spinner-center">
                    <button id="enterWorldBtn" class="enter-world-btn">
                        <span class="btn-text">长按进入世界</span>
                    </button>
                </div>
                
                <!-- Pointer -->
                <div class="spinner-pointer"></div>
            </div>
            
            <!-- Butterfly Container -->
            <div id="butterflyContainer" class="butterfly-container"></div>
            
            <!-- Result Display -->
            <div id="spinnerResult" class="spinner-result">
                <div class="result-content">
                    <h2>您的身份</h2>
                    <div class="result-combination">
                        <div class="result-location">
                            <span class="result-label">地点：</span>
                            <span id="resultLocation"></span>
                        </div>
                        <div class="result-identity">
                            <span class="result-label">身份：</span>
                            <span id="resultIdentity"></span>
                        </div>
                    </div>
                    <button id="startGameBtn" class="btn btn-primary">开始游戏</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
        // Mock configuration and functions for testing
        const CONFIG = {
            STORAGE_KEYS: {
                CURRENT_GAME: 'junYouJiFouGame'
            }
        };
        
        const storageService = {
            saveToLocal: (key, data) => {
                localStorage.setItem(key, JSON.stringify(data));
            }
        };
        
        function showToast(title, description, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <div class="toast-title">${title}</div>
                <div class="toast-description">${description}</div>
            `;
            
            document.getElementById('toastContainer').appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 3000);
        }
    </script>
    <script src="spinner-test.js"></script>
</body>
</html>
